<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>MyShadow — Ibadah & Keuangan</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script>
tailwind.config={theme:{extend:{fontFamily:{sans:['Outfit','sans-serif']}}}}
</script>
<style>
:root,[data-mode="ibadah"]{
--bg:#091714;--bg2:#0D211B;--card:rgba(13,45,36,0.5);--card-h:rgba(18,58,46,0.6);
--tx:#E2F0E8;--tx2:#7BA690;--txm:#3D6B55;--accent:#34D399;--accent-d:rgba(52,211,153,0.13);
--gold:#D4A853;--border:rgba(52,211,153,0.08);--danger:#EF6461;--success:#34D399;
--glow1:rgba(52,211,153,0.06);--glow2:rgba(212,168,83,0.04);
}
[data-mode="financial"]{
--bg:#0A0A10;--bg2:#10101A;--card:rgba(20,20,35,0.55);--card-h:rgba(28,28,48,0.65);
--tx:#EEEEF5;--tx2:#7C7C9A;--txm:#48486A;--accent:#F59E0B;--accent-d:rgba(245,158,11,0.1);
--gold:#22D3EE;--border:rgba(245,158,11,0.08);--danger:#EF4444;--success:#22C55E;
--glow1:rgba(245,158,11,0.05);--glow2:rgba(34,211,238,0.03);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--tx);overflow-x:hidden;transition:background .6s ease,color .4s ease;min-height:100dvh}
body::before{content:'';position:fixed;top:-30%;left:-20%;width:70%;height:70%;background:radial-gradient(circle,var(--glow1),transparent 70%);pointer-events:none;z-index:0;animation:floatOrb 20s ease-in-out infinite}
body::after{content:'';position:fixed;bottom:-20%;right:-20%;width:60%;height:60%;background:radial-gradient(circle,var(--glow2),transparent 70%);pointer-events:none;z-index:0;animation:floatOrb 25s ease-in-out infinite reverse}
@keyframes floatOrb{0%,100%{transform:translate(0,0)}50%{transform:translate(40px,30px)}}
#modeOverlay{position:fixed;inset:0;z-index:100;pointer-events:none;opacity:0;transition:opacity .15s}
#modeOverlay.active{opacity:1}
#app{position:relative;z-index:1;max-width:430px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;padding-bottom:80px}
.app-header{padding:12px 20px 0;position:sticky;top:0;z-index:50;background:linear-gradient(to bottom,var(--bg) 60%,transparent);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.mode-toggle{display:flex;background:var(--card);border-radius:14px;padding:3px;position:relative;border:1px solid var(--border)}
.mode-btn{flex:1;padding:10px 0;text-align:center;font-size:13px;font-weight:500;color:var(--tx2);cursor:pointer;position:relative;z-index:2;transition:color .3s;display:flex;align-items:center;justify-content:center;gap:6px;border-radius:11px;user-select:none}
.mode-btn.active{color:var(--bg);font-weight:700}
.mode-pill{position:absolute;top:3px;left:3px;width:calc(50% - 3px);height:calc(100% - 6px);background:var(--accent);border-radius:11px;transition:transform .4s cubic-bezier(.4,0,.2,1),background .4s;z-index:1}
.mode-pill.right{transform:translateX(100%)}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;transition:background .3s,border-color .3s}
.card:hover{background:var(--card-h)}
.prayer-card{display:flex;align-items:center;gap:14px;padding:14px 16px;cursor:pointer;transition:all .25s;border-radius:14px;background:var(--card);border:1px solid var(--border);position:relative;overflow:hidden}
.prayer-card:active{transform:scale(.98)}
.prayer-card .status-dot{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .3s;border:2px solid var(--txm);color:var(--txm);flex-shrink:0}
.prayer-card .status-dot.ontime{border-color:var(--success);color:var(--success);background:rgba(52,211,153,0.12);box-shadow:0 0 12px rgba(52,211,153,0.2)}
.prayer-card .status-dot.late{border-color:var(--gold);color:var(--gold);background:rgba(212,168,83,0.12)}
.prayer-card .status-dot.missed{border-color:var(--danger);color:var(--danger);background:rgba(239,100,97,0.1)}
.score-ring{position:relative;width:160px;height:160px;margin:0 auto}
.score-ring svg{transform:rotate(-90deg)}
.score-ring .ring-bg{stroke:var(--border);fill:none;stroke-width:10}
.score-ring .ring-fg{fill:none;stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1),stroke .4s}
.score-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.score-num{font-size:42px;font-weight:800;line-height:1;color:var(--tx)}
.score-label{font-size:11px;color:var(--tx2);margin-top:2px}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:linear-gradient(to top,var(--bg) 70%,transparent);padding:8px 20px 12px;z-index:50;display:flex;justify-content:space-around;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;color:var(--txm);transition:color .25s;font-size:10px;font-weight:500;padding:6px 16px;border-radius:12px}
.nav-item.active{color:var(--accent)}
.nav-item i{font-size:18px;transition:transform .25s}
.nav-item.active i{transform:scale(1.15)}
.fab{position:fixed;bottom:90px;right:max(calc((100% - 430px)/2 + 20px),20px);width:54px;height:54px;border-radius:50%;background:var(--accent);color:var(--bg);border:none;font-size:24px;cursor:pointer;z-index:55;box-shadow:0 4px 20px var(--accent-d);transition:transform .25s,box-shadow .25s;display:none;align-items:center;justify-content:center}
.fab:hover{transform:scale(1.08);box-shadow:0 6px 28px var(--accent-d)}
.fab:active{transform:scale(.95)}
.fab.show{display:flex}
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.modal-backdrop.show{opacity:1;pointer-events:auto}
.modal-sheet{background:var(--bg2);border:1px solid var(--border);border-radius:24px 24px 0 0;width:100%;max-width:430px;max-height:85dvh;overflow-y:auto;padding:8px 24px 32px;transform:translateY(100%);transition:transform .4s cubic-bezier(.4,0,.2,1)}
.modal-backdrop.show .modal-sheet{transform:translateY(0)}
.modal-handle{width:40px;height:4px;border-radius:2px;background:var(--txm);margin:8px auto 20px}
.input{width:100%;padding:12px 16px;border-radius:12px;border:1px solid var(--border);background:var(--card);color:var(--tx);font-family:inherit;font-size:14px;outline:none;transition:border-color .2s}
.input:focus{border-color:var(--accent)}
.input::placeholder{color:var(--txm)}
.btn{padding:12px 24px;border-radius:12px;border:none;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--accent);color:var(--bg)}
.btn-primary:hover{opacity:.9;transform:translateY(-1px)}
.btn-primary:active{transform:scale(.97)}
.chip{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);color:var(--tx2);transition:all .2s;user-select:none}
.chip.active{background:var(--accent-d);border-color:var(--accent);color:var(--accent)}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);background:var(--card-h);border:1px solid var(--border);color:var(--tx);padding:12px 24px;border-radius:14px;font-size:13px;font-weight:500;z-index:300;backdrop-filter:blur(12px);transition:transform .4s cubic-bezier(.4,0,.2,1);white-space:nowrap;max-width:90vw;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0)}
.sunnah-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:10px 16px;border-radius:12px;background:var(--card);border:1px solid var(--border);cursor:pointer;transition:all .25s;color:var(--tx2);font-size:13px;font-weight:500}
.sunnah-btn:active{transform:scale(.95)}
.sunnah-btn.has-value{border-color:var(--accent);color:var(--accent);background:var(--accent-d)}
.tx-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.tx-item:last-child{border-bottom:none}
.tx-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.tx-item.income .tx-icon{background:rgba(34,197,94,0.12);color:#22C55E}
.tx-item.expense .tx-icon{background:rgba(239,68,68,0.1);color:#EF4444}
.fade-up{animation:fadeUp .5s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.fade-up-d1{animation-delay:.05s}.fade-up-d2{animation-delay:.1s}.fade-up-d3{animation-delay:.15s}.fade-up-d4{animation-delay:.2s}.fade-up-d5{animation-delay:.25s}
@keyframes pulseGlow{0%,100%{filter:drop-shadow(0 0 8px var(--accent-d))}50%{filter:drop-shadow(0 0 20px var(--accent-d))}}
.perfect-glow{animation:pulseGlow 2s ease-in-out infinite}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--txm);border-radius:4px}
.cat-makanan{background:rgba(251,146,60,0.12);color:#FB923C}
.cat-transportasi{background:rgba(59,130,246,0.12);color:#3B82F6}
.cat-belanja{background:rgba(168,85,247,0.12);color:#A855F7}
.cat-tagihan{background:rgba(239,68,68,0.1);color:#EF4444}
.cat-hiburan{background:rgba(236,72,153,0.12);color:#EC4899}
.cat-kesehatan{background:rgba(34,197,94,0.12);color:#22C55E}
.cat-pendidikan{background:rgba(14,165,233,0.12);color:#0EA5E9}
.cat-gaji{background:rgba(34,197,94,0.12);color:#22C55E}
.cat-freelance{background:rgba(14,165,233,0.12);color:#0EA5E9}
.cat-lainnya{background:rgba(148,163,184,0.12);color:#94A3B8}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>
<body data-mode="ibadah">
<div id="modeOverlay"></div>
<div id="toast" class="toast"></div>
<div id="app">
<header class="app-header">
<div class="mode-toggle" id="modeToggle">
<div class="mode-pill" id="modePill"></div>
<div class="mode-btn active" data-mode="ibadah" onclick="app.switchMode('ibadah')"><i class="fa-solid fa-hands-praying"></i> Ibadah</div>
<div class="mode-btn" data-mode="financial" onclick="app.switchMode('financial')"><i class="fa-solid fa-wallet"></i> Keuangan</div>
</div>
<div id="dateDisplay" class="text-center mt-3 text-sm" style="color:var(--tx2)"></div>
</header>
<main id="mainContent" class="flex-1 px-5 pt-3 pb-4"></main>
<nav class="bottom-nav" id="bottomNav"></nav>
<button class="fab" id="fab" onclick="app.openAddTransaction()" aria-label="Tambah Transaksi"><i class="fa-solid fa-plus"></i></button>
</div>
<div class="modal-backdrop" id="modalBackdrop" onclick="app.closeModal(event)">
<div class="modal-sheet" id="modalSheet" onclick="event.stopPropagation()">
<div class="modal-handle"></div>
<div id="modalContent"></div>
</div>
</div>
<script>
const $=s=>document.querySelector(s);
const $$=s=>document.querySelectorAll(s);
const uid=()=>crypto.randomUUID?crypto.randomUUID():'xxxx-xxxx-xxxx'.replace(/x/g,()=>(Math.random()*16|0).toString(16));
const today=()=>new Date().toISOString().split('T')[0];
const pad=n=>String(n).padStart(2,'0');
const HARI=['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
const BULAN=['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
const SHOLAT_NAMES=['subuh','dzuhur','ashar','maghrib','isya'];
const SHOLAT_LABELS={subuh:'Subuh',dzuhur:'Dzuhur',ashar:'Ashar',maghrib:'Maghrib',isya:'Isya'};
const SUNNAH_ITEMS=[
{key:'qobliyahSubuh',label:'Qobliyah Subuh',steps:[0,2]},
{key:"ba'diyahDzuhur",label:"Ba'diyah Dzuhur",steps:[0,2]},
{key:'dhuha',label:'Dhuha',steps:[0,2,4,8]},
{key:'tahajud',label:'Tahajud',steps:[0,2,4,8]},
{key:'witir',label:'Witir',steps:[0,1,3]}
];
const STATUS_CYCLE=[null,'ontime','late','missed'];
const DEFAULT_CATEGORIES=[
{id:'c1',name:'Makanan',type:'expense',icon:'fa-utensils',cls:'cat-makanan'},
{id:'c2',name:'Transportasi',type:'expense',icon:'fa-car',cls:'cat-transportasi'},
{id:'c3',name:'Belanja',type:'expense',icon:'fa-bag-shopping',cls:'cat-belanja'},
{id:'c4',name:'Tagihan',type:'expense',icon:'fa-file-invoice',cls:'cat-tagihan'},
{id:'c5',name:'Hiburan',type:'expense',icon:'fa-gamepad',cls:'cat-hiburan'},
{id:'c6',name:'Kesehatan',type:'expense',icon:'fa-heart-pulse',cls:'cat-kesehatan'},
{id:'c7',name:'Pendidikan',type:'expense',icon:'fa-book',cls:'cat-pendidikan'},
{id:'c8',name:'Gaji',type:'income',icon:'fa-briefcase',cls:'cat-gaji'},
{id:'c9',name:'Freelance',type:'income',icon:'fa-laptop',cls:'cat-freelance'},
{id:'c10',name:'Lainnya',type:'income',icon:'fa-ellipsis',cls:'cat-lainnya'}
];
const DEFAULT_ACCOUNTS=[
{id:'a1',name:'Tunai',type:'cash',balance:450000,color:'#34D399',icon:'fa-money-bill-wave'},
{id:'a2',name:'Bank BCA',type:'bank',balance:2750000,color:'#60A5FA',icon:'fa-building-columns'},
{id:'a3',name:'GoPay',type:'ewallet',balance:320000,color:'#A78BFA',icon:'fa-mobile-screen'}
];
function fmtRp(n){return 'Rp '+Math.abs(n).toLocaleString('id-ID')}
function fmtDate(d){const dt=new Date(d);return HARI[dt.getDay()]+', '+dt.getDate()+' '+BULAN[dt.getMonth()]+' '+dt.getFullYear()}
function fmtShort(d){const dt=new Date(d);return dt.getDate()+'/'+(dt.getMonth()+1)}
function daysAgo(n){const d=new Date();d.setDate(d.getDate()-n);return d.toISOString().split('T')[0]}
function getWeekDates(){const dates=[];const now=new Date();const day=now.getDay();const mon=new Date(now);mon.setDate(now.getDate()-(day===0?6:day-1));for(let i=0;i<7;i++){const d=new Date(mon);d.setDate(mon.getDate()+i);dates.push(d.toISOString().split('T')[0])}return dates}
function calcPrayerTimes(dateStr){
const d=new Date(dateStr+'T00:00:00');const start=new Date(d.getFullYear(),0,0);const diff=d-start;const doy=Math.floor(diff/864e5);
const lat=-6.2,lng=106.8,tz=7;const dec=23.45*Math.sin(2*Math.PI/365*(doy-81));const dr=dec*Math.PI/180;const lr=lat*Math.PI/180;
const B=2*Math.PI/365*(doy-81);const EoT=9.87*Math.sin(2*B)-7.53*Math.cos(B)-1.5*Math.sin(B);
const sn=12-(lng-tz*15)/15+EoT/60;
const cosH=Math.max(-1,Math.min(1,(-Math.sin(-0.833*Math.PI/180)-Math.sin(lr)*Math.sin(dr))/(Math.cos(lr)*Math.cos(dr))));
const HA=Math.acos(cosH)*180/Math.PI/15;const sr=sn-HA;const ss=sn+HA;
const fmt=h=>{let hh=Math.floor(h);let mm=Math.round((h-hh)*60);if(mm>=60){hh++;mm=0}if(hh<0)hh+=24;return pad(hh)+':'+pad(mm)};
return{subuh:fmt(sr-1.33),dzuhur:fmt(sn+0.08),ashar:fmt(sn+HA+0.55),maghrib:fmt(ss+0.05),isya:fmt(ss+1.3)}
}
function showToast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2500)}
function getGreeting(){const h=new Date().getHours();if(h<4)return 'Selamat malam';if(h<10)return 'Selamat pagi';if(h<15)return 'Selamat siang';if(h<18)return 'Selamat sore';return 'Selamat malam'}

class NuurApp{
constructor(){this.state=this.loadState();this.charts={};this.render()}
defaultState(){return{mode:'ibadah',page:{ibadah:'today',financial:'summary'},worship:{},accounts:DEFAULT_ACCOUNTS.map(a=>({...a})),categories:DEFAULT_CATEGORIES.map(c=>({...c})),transactions:[],debts:[]}}
loadState(){try{const s=localStorage.getItem('myshadow_state');if(s){const p=JSON.parse(s);return{...this.defaultState(),...p}}}catch(e){}const s=this.defaultState();this.seedData(s);return s}
saveState(){try{localStorage.setItem('myshadow_state',JSON.stringify(this.state))}catch(e){}}
seedData(s){
for(let i=1;i<=7;i++){const d=daysAgo(i);const w={sholatWajib:{},sholatSunnah:{},amal:{infaq:0,tadarus:0}};
SHOLAT_NAMES.forEach(n=>{const r=Math.random();w.sholatWajib[n]=r<.55?'ontime':r<.8?'late':r<.92?'missed':null});
SUNNAH_ITEMS.forEach(si=>{w.sholatSunnah[si.key]=si.steps[Math.floor(Math.random()*si.steps.length)]});
if(Math.random()>.5)w.amal.infaq=Math.floor(Math.random()*50000)+5000;if(Math.random()>.6)w.amal.tadarus=Math.floor(Math.random()*5)+1;s.worship[d]=w}
const txTypes=[{cat:'c1',desc:'Makan siang',min:15000,max:45000},{cat:'c2',desc:'Gojek',min:8000,max:35000},{cat:'c3',desc:'Belanja harian',min:25000,max:150000},{cat:'c4',desc:'Listrik',min:100000,max:300000},{cat:'c5',desc:'Nonton film',min:30000,max:80000},{cat:'c6',desc:'Obat',min:15000,max:75000},{cat:'c8',desc:'Gaji',min:3000000,max:5000000,type:'income'},{cat:'c9',desc:'Project web',min:500000,max:2000000,type:'income'}];
for(let i=0;i<7;i++){const d=daysAgo(i);const count=Math.floor(Math.random()*3)+1;for(let j=0;j<count;j++){const t=txTypes[Math.floor(Math.random()*txTypes.length)];const amt=Math.floor(Math.random()*(t.max-t.min))+t.min;const acc=s.accounts[Math.floor(Math.random()*s.accounts.length)];s.transactions.push({id:uid(),type:t.type||'expense',amount:amt,accountId:acc.id,categoryId:t.cat,description:t.desc,date:d,createdAt:new Date(d+'T'+pad(8+Math.floor(Math.random()*12))+':'+pad(Math.floor(Math.random()*60))).toISOString()})}}
s.transactions.push({id:uid(),type:'income',amount:4500000,accountId:'a2',categoryId:'c8',description:'Gaji bulanan',date:daysAgo(5),createdAt:daysAgo(5)+'T08:00:00'})}
getWorship(date){return this.state.worship[date]||{sholatWajib:{},sholatSunnah:{},amal:{infaq:0,tadarus:0}}}
setWorship(date,data){this.state.worship[date]=data;this.saveState()}
calcScore(date){const w=this.getWorship(date);let pts=0,max=0;SHOLAT_NAMES.forEach(n=>{max+=20;const s=w.sholatWajib[n];if(s==='ontime')pts+=20;else if(s==='late')pts+=10});SUNNAH_ITEMS.forEach(si=>{const mR=si.steps[si.steps.length-1];max+=mR*2;pts+=(w.sholatSunnah[si.key]||0)*2});max+=5;if(w.amal.infaq>0)pts+=5;max+=20;pts+=Math.min(w.amal.tadarus||0,4)*5;return{score:pts,max,percent:max>0?Math.round(pts/max*100):0}}
calcStreak(){let streak=0;for(let i=0;i<365;i++){const d=daysAgo(i);if(this.calcScore(d).percent>=60)streak++;else break}return streak}
switchMode(mode){if(mode===this.state.mode)return;const overlay=$('#modeOverlay');overlay.style.background=mode==='ibadah'?'#091714':'#0A0A10';overlay.classList.add('active');setTimeout(()=>{this.state.mode=mode;document.body.dataset.mode=mode;const pill=$('#modePill');if(mode==='financial')pill.classList.add('right');else pill.classList.remove('right');$$('.mode-btn').forEach(b=>{b.classList.toggle('active',b.dataset.mode===mode)});$('#fab').classList.toggle('show',mode==='financial');this.renderNav();this.render()},200);setTimeout(()=>overlay.classList.remove('active'),500);this.saveState()}
navigate(page){this.state.page[this.state.mode]=page;this.saveState();this.render()}
render(){const m=this.state.mode,p=this.state.page[m];if(m==='ibadah'){if(p==='today')this.renderIbadahToday();else if(p==='history')this.renderIbadahHistory();else if(p==='insights')this.renderIbadahInsights()}else{if(p==='summary')this.renderFinancialSummary();else if(p==='transactions')this.renderFinancialTransactions();else if(p==='analytics')this.renderFinancialAnalytics()}$('#dateDisplay').textContent=fmtDate(today())}

const catArr=Object.entries(catExp).sort((a,b)=>b[1].amount-a[1].amount);const catColors=['#F59E0B','#22D3EE','#A78BFA','#FB923C','#EC4899','#22C55E','#EF4444','#60A5FA'];
const dailyExp=week.map(d=>weekExp.filter(t=>t.date===d).reduce((a,t)=>a+t.amount,0));const dailyInc=week.map(d=>weekInc.filter(t=>t.date===d).reduce((a,t)=>a+t.amount,0));const dailyLabels=week.map(d=>HARI[new Date(d).getDay()].slice(0,3));
 $('#mainContent').innerHTML='<div class="fade-up"><h1 class="text-xl font-bold mb-4" style="color:var(--tx)">Analitik Minggu Ini</h1><div class="card mb-3" style="padding:20px"><div style="font-size:12px;color:var(--tx2);margin-bottom:2px">Selisih Minggu Ini</div><div class="text-2xl font-extrabold" style="color:'+(totalInc-totalExp>=0?'#22C55E':'var(--danger)')+'">'+(totalInc-totalExp>=0?'+':'-')+fmtRp(Math.abs(totalInc-totalExp))+'</div><div class="flex gap-6 mt-2"><span style="font-size:12px;color:#22C55E">Masuk: '+fmtRp(totalInc)+'</span><span style="font-size:12px;color:var(--danger)">Keluar: '+fmtRp(totalExp)+'</span></div></div><div class="card mb-3"><h3 class="text-sm font-semibold mb-3" style="color:var(--tx2)">Trend Harian</h3><canvas id="chartDaily" height="180"></canvas></div>'+(catArr.length?'<div class="card mb-3"><h3 class="text-sm font-semibold mb-3" style="color:var(--tx2)">Pengeluaran per Kategori</h3><div class="flex items-center gap-4"><div style="width:120px;height:120px;flex-shrink:0"><canvas id="chartCat"></canvas></div><div class="flex-1 flex flex-col gap-2">'+catArr.slice(0,5).map(([name,data],i)=>'<div class="flex items-center gap-2"><div style="width:8px;height:8px;border-radius:2px;background:'+catColors[i%catColors.length]+';flex-shrink:0"></div><span style="font-size:11px;color:var(--tx);flex:1">'+name+'</span><span style="font-size:11px;color:var(--txm)">'+fmtRp(data.amount)+'</span></div>').join('')+'</div></div></div>':'')+'<div class="card mb-3"><h3 class="text-sm font-semibold mb-3" style="color:var(--tx2)">Kategori Terbesar</h3>'+catArr.slice(0,4).map(([name,data],i)=>{const pct=totalExp>0?Math.round(data.amount/totalExp*100):0;return'<div class="mb-3 last:mb-0"><div class="flex justify-between mb-1"><span style="font-size:13px;color:var(--tx)">'+name+'</span><span style="font-size:12px;color:var(--txm)">'+pct+'%</span></div><div class="h-2 rounded-full" style="background:var(--card)"><div class="h-full rounded-full" style="width:'+pct+'%;background:'+catColors[i%catColors.length]+';transition:width .8s"></div></div></div>'}).join('')+'</div>'+this.getFinancialCrossInsight(week)+'</div>';
setTimeout(()=>{this.renderDailyChart(dailyLabels,dailyInc,dailyExp);if(catArr.length)this.renderCatChart(catArr,catColors)},100);$('#fab').classList.add('show');this.renderNav()}

renderDailyChart(labels,inc,exp){const ctx=document.getElementById('chartDaily');if(!ctx)return;if(this.charts.daily)this.charts.daily.destroy();this.charts.daily=new Chart(ctx,{type:'bar',data:{labels,datasets:[{label:'Pemasukan',data:inc,backgroundColor:'rgba(34,197,94,0.6)',borderRadius:6,borderSkipped:false},{label:'Pengeluaran',data:exp,backgroundColor:'rgba(245,158,11,0.6)',borderRadius:6,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#888',font:{size:10,family:'Outfit'},boxWidth:12,padding:12}}},scales:{x:{ticks:{color:'#666',font:{size:10,family:'Outfit'}},grid:{display:false}},y:{ticks:{color:'#666',font:{size:10,family:'Outfit'},callback:v=>v>=1e6?(v/1e6)+'jt':v>=1e3?(v/1e3)+'rb':v},grid:{color:'rgba(255,255,255,0.04)'}}}}})}

renderCatChart(catArr,colors){const ctx=document.getElementById('chartCat');if(!ctx)return;if(this.charts.cat)this.charts.cat.destroy();this.charts.cat=new Chart(ctx,{type:'doughnut',data:{labels:catArr.map(c=>c[0]),datasets:[{data:catArr.map(c=>c[1].amount),backgroundColor:colors.slice(0,catArr.length),borderWidth:0,hoverOffset:6}]},options:{responsive:true,maintainAspectRatio:true,cutout:'65%',plugins:{legend:{display:false},tooltip:{bodyFont:{family:'Outfit'},callbacks:{label:c=>fmtRp(c.raw)}}}}})}

getFinancialCrossInsight(week){let data=week.map(d=>({sc:this.calcScore(d).percent,exp:this.state.transactions.filter(t=>t.date===d&&t.type==='expense').reduce((a,t)=>a+t.amount,0)}));const hI=data.filter(x=>x.sc>=70),lI=data.filter(x=>x.sc<70);const aH=hI.length?Math.round(hI.reduce((a,x)=>a+x.exp,0)/hI.length):0,aL=lI.length?Math.round(lI.reduce((a,x)=>a+x.exp,0)/lI.length):0;let msg='';if(hI.length>=2&&lI.length>=1){if(aL>aH+20000)msg='Di hari ibadah kurang konsisten, pengeluaran rata-rata lebih tinggi sebesar '+fmtRp(aL-aH)+'. Konsistensi ibadah mungkin membantu pengendalian diri.';else if(aH>aL+20000)msg='Menarik: di hari ibadah konsisten, pengeluaran justru lebih tinggi '+fmtRp(aH-aL)+'. Mungkin ada pola belanja di hari produktif.'}if(!msg)msg='Terus catat aktivitasmu untuk mendapatkan korelasi antara ibadah dan keuangan.';return'<div class="card" style="border-color:var(--accent);border-width:1px;background:var(--accent-d)"><div class="flex items-start gap-3"><i class="fa-solid fa-link" style="color:var(--accent);margin-top:3px"></i><div><div style="font-size:12px;font-weight:700;color:var(--accent);margin-bottom:4px">Korelasi Ibadah & Keuangan</div><p style="font-size:13px;color:var(--tx2);line-height:1.6">'+msg+'</p></div></div></div>'}

openModal(html){$('#modalContent').innerHTML=html;$('#modalBackdrop').classList.add('show')}
closeModal(e){if(e&&e.target!==e.currentTarget)return;$('#modalBackdrop').classList.remove('show')}

openAddTransaction(){
const accs=this.state.accounts,expC=this.state.categories.filter(c=>c.type==='expense'),incC=this.state.categories.filter(c=>c.type==='income');
this.openModal('<h2 class="text-lg font-bold mb-4" style="color:var(--tx)">Tambah Transaksi</h2><div class="flex gap-2 mb-4" id="txTypeChips"><div class="chip active" data-txtype="expense" onclick="app.toggleTxType(\'expense\')"><i class="fa-solid fa-arrow-down"></i> Pengeluaran</div><div class="chip" data-txtype="income" onclick="app.toggleTxType(\'income\')"><i class="fa-solid fa-arrow-up"></i> Pemasukan</div></div><div class="mb-3"><label style="font-size:12px;color:var(--tx2);display:block;margin-bottom:6px">Jumlah</label><input class="input" type="number" id="txAmount" placeholder="0" inputmode="numeric" style="font-size:20px;font-weight:700"></div><div class="mb-3"><label style="font-size:12px;color:var(--tx2);display:block;margin-bottom:6px">Deskripsi</label><input class="input" type="text" id="txDesc" placeholder="Contoh: Makan siang"></div><div class="mb-3"><label style="font-size:12px;color:var(--tx2);display:block;margin-bottom:6px">Kategori</label><div class="flex flex-wrap gap-2" id="txCatChips">'+expC.map(c=>'<div class="chip active" data-catid="'+c.id+'" onclick="app.selectTxCat(\''+c.id+'\')">'+c.name+'</div>').join('')+'</div></div><div class="mb-4"><label style="font-size:12px;color:var(--tx2);display:block;margin-bottom:6px">Akun</label><div class="flex flex-wrap gap-2" id="txAccChips">'+accs.map((a,i)=>'<div class="chip '+(i===0?'active':'')+'" data-accid="'+a.id+'" onclick="app.selectTxAcc(\''+a.id+'\')">'+a.name+'</div>').join('')+'</div></div><button class="btn btn-primary w-full" onclick="app.submitTransaction()">Simpan Transaksi</button>');
this._txType='expense';this._txCat=expC[0].id;this._txAcc=accs[0].id}

toggleTxType(type){this._txType=type;$$('#txTypeChips .chip').forEach(c=>c.classList.toggle('active',c.dataset.txtype===type));const cats=this.state.categories.filter(c=>c.type===type);this._txCat=cats[0].id;$('#txCatChips').innerHTML=cats.map(c=>'<div class="chip '+(c.id===this._txCat?'active':'')+'" data-catid="'+c.id+'" onclick="app.selectTxCat(\''+c.id+'\')">'+c.name+'</div>').join('')}
selectTxCat(id){this._txCat=id;$$('#txCatChips .chip').forEach(c=>c.classList.toggle('active',c.dataset.catid===id))}
selectTxAcc(id){this._txAcc=id;$$('#txAccChips .chip').forEach(c=>c.classList.toggle('active',c.dataset.accid===id))}
submitTransaction(){const amount=parseInt($('#txAmount').value),desc=$('#txDesc').value.trim();if(!amount||amount<=0){showToast('Masukkan jumlah yang valid');return}if(!desc){showToast('Masukkan deskripsi');return}const tx={id:uid(),type:this._txType,amount,accountId:this._txAcc,categoryId:this._txCat,description:desc,date:today(),createdAt:new Date().toISOString()};this.state.transactions.push(tx);const acc=this.state.accounts.find(a=>a.id===this._txAcc);if(acc){if(this._txType==='income')acc.balance+=amount;else acc.balance-=amount}this.saveState();$('#modalBackdrop').classList.remove('show');showToast(this._txType==='income'?'Pemasukan dicatat':'Pengeluaran dicatat');this.render()}

openAddAccount(){this.openModal('<h2 class="text-lg font-bold mb-4" style="color:var(--tx)">Tambah Akun</h2><div class="mb-3"><label style="font-size:12px;color:var(--tx2);display:block;margin-bottom:6px">Nama Akun</label><input class="input" type="text" id="accName" placeholder="Contoh: OVO"></div><div class="mb-3"><label style="font-size:12px;color:var(--tx2);display:block;margin-bottom:6px">Tipe</label><div class="flex gap-2" id="accTypeChips"><div class="chip active" data-acctype="cash" onclick="app.selectAccType(\'cash\')">Tunai</div><div class="chip" data-acctype="bank" onclick="app.selectAccType(\'bank\')">Bank</div><div class="chip" data-acctype="ewallet" onclick="app.selectAccType(\'ewallet\')">E-Wallet</div></div></div><div class="mb-4"><label style="font-size:12px;color:var(--tx2);display:block;margin-bottom:6px">Saldo Awal</label><input class="input" type="number" id="accBalance" placeholder="0" inputmode="numeric"></div><button class="btn btn-primary w-full" onclick="app.submitAccount()">Simpan Akun</button>');this._accType='cash'}
selectAccType(type){this._accType=type;$$('#accTypeChips .chip').forEach(c=>c.classList.toggle('active',c.dataset.acctype===type))}
submitAccount(){const name=$('#accName').value.trim(),balance=parseInt($('#accBalance').value)||0;if(!name){showToast('Masukkan nama akun');return}const icons={cash:'fa-money-bill-wave',bank:'fa-building-columns',ewallet:'fa-mobile-screen'};const colors=['#F59E0B','#22D3EE','#A78BFA','#FB923C','#EC4899','#22C55E'];this.state.accounts.push({id:uid(),name,type:this._accType,balance,color:colors[this.state.accounts.length%colors.length],icon:icons[this._accType]});this.saveState();$('#modalBackdrop').classList.remove('show');showToast('Akun ditambahkan');this.render()}

openInfaqInput(){const w=this.getWorship(today());this.openModal('<h2 class="text-lg font-bold mb-4" style="color:var(--tx)">Catat Infaq / Sedekah</h2><div class="mb-4"><label style="font-size:12px;color:var(--tx2);display:block;margin-bottom:6px">Jumlah (Rp)</label><input class="input" type="number" id="infaqAmount" placeholder="0" inputmode="numeric" value="'+(w.amal.infaq||'')+'" style="font-size:20px;font-weight:700"></div><div class="flex gap-2 mb-4">'+[10000,25000,50000,100000].map(v=>'<div class="chip" onclick="document.getElementById(\'infaqAmount\').value='+v+'">'+fmtRp(v)+'</div>').join('')+'</div><button class="btn btn-primary w-full" onclick="app.submitInfaq()">Simpan</button>')}
submitInfaq(){const amount=parseInt($('#infaqAmount').value)||0;const w=this.getWorship(today());w.amal.infaq=amount;this.setWorship(today(),w);$('#modalBackdrop').classList.remove('show');showToast(amount>0?'Infaq dicatat. Jazakallahu khairan':'Infaq direset');this.render()}

openTadarusInput(){const w=this.getWorship(today());this.openModal('<h2 class="text-lg font-bold mb-4" style="color:var(--tx)">Catat Tadarus Al-Quran</h2><div class="mb-4"><label style="font-size:12px;color:var(--tx2);display:block;margin-bottom:6px">Jumlah Juz</label><input class="input" type="number" id="tadarusAmount" placeholder="0" inputmode="numeric" min="0" max="30" value="'+(w.amal.tadarus||'')+'" style="font-size:20px;font-weight:700"></div><div class="flex gap-2 mb-4">'+[1,2,3,5].map(v=>'<div class="chip" onclick="document.getElementById(\'tadarusAmount\').value='+v+'">'+v+' juz</div>').join('')+'</div><button class="btn btn-primary w-full" onclick="app.submitTadarus()">Simpan</button>')}
submitTadarus(){const amount=Math.min(30,Math.max(0,parseInt($('#tadarusAmount').value)||0));const w=this.getWorship(today());w.amal.tadarus=amount;this.setWorship(today(),w);$('#modalBackdrop').classList.remove('show');showToast(amount>0?amount+' juz dicatat. Barakallahu fik':'Tadarus direset');this.render()}

openDayDetail(date){const w=this.getWorship(date),sc=this.calcScore(date),times=calcPrayerTimes(date);this.openModal('<h2 class="text-lg font-bold mb-1" style="color:var(--tx)">'+fmtDate(date)+'</h2><div class="mb-4" style="font-size:24px;font-weight:800;color:var(--accent)">'+sc.percent+'<span style="font-size:14px;font-weight:400;color:var(--tx2)">/ 100</span></div><h3 class="text-sm font-semibold mb-2" style="color:var(--tx2)">Sholat Wajib</h3><div class="flex flex-col gap-2 mb-4">'+SHOLAT_NAMES.map(n=>{const st=w.sholatWajib[n];const label={ontime:'Tepat Waktu',late:'Terlambat',missed:'Tidak Dilakukan'}[st]||'Tidak Dicatat';const color={ontime:'var(--success)',late:'var(--gold)',missed:'var(--danger)'}[st]||'var(--txm)';return'<div class="flex items-center justify-between" style="padding:8px 0;border-bottom:1px solid var(--border)"><span style="font-size:13px;color:var(--tx)">'+SHOLAT_LABELS[n]+' <span style="color:var(--txm);font-size:11px">'+times[n]+'</span></span><span style="font-size:12px;font-weight:600;color:'+color+'">'+label+'</span></div>'}).join('')+'</div><h3 class="text-sm font-semibold mb-2" style="color:var(--tx2)">Sholat Sunnah</h3><div class="flex flex-col gap-1 mb-4">'+SUNNAH_ITEMS.map(si=>{const val=w.sholatSunnah[si.key]||0;return'<div class="flex items-center justify-between" style="padding:6px 0"><span style="font-size:13px;color:var(--tx)">'+si.label+'</span><span style="font-size:12px;color:'+(val?'var(--accent)':'var(--txm)')+'">'+(val>0?val+' rakaat':'-')+'</span></div>'}).join('')+'</div><h3 class="text-sm font-semibold mb-2" style="color:var(--tx2)">Amal</h3><div class="flex gap-4 mb-2"><div><span style="font-size:11px;color:var(--txm)">Infaq</span><div style="font-size:14px;font-weight:600;color:var(--gold)">'+(w.amal.infaq>0?fmtRp(w.amal.infaq):'-')+'</div></div><div><span style="font-size:11px;color:var(--txm)">Tadarus</span><div style="font-size:14px;font-weight:600;color:var(--accent)">'+(w.amal.tadarus>0?w.amal.tadarus+' juz':'-')+'</div></div></div>')}

handleAction(el){const action=el.dataset.action;if(!action)return;switch(action){case 'prayer':{const name=el.dataset.name;const w=this.getWorship(today());const cur=w.sholatWajib[name];const idx=STATUS_CYCLE.indexOf(cur);w.sholatWajib[name]=STATUS_CYCLE[(idx+1)%STATUS_CYCLE.length];this.setWorship(today(),w);const st=w.sholatWajib[name];if(st==='ontime')showToast(SHOLAT_LABELS[name]+' tepat waktu. MasyaAllah.');else if(st==='late')showToast(SHOLAT_LABELS[name]+' terlambat.');else if(st==='missed')showToast(SHOLAT_LABELS[name]+' tidak dilakukan.');this.render();break}case 'sunnah':{const key=el.dataset.key;const si=SUNNAH_ITEMS.find(s=>s.key===key);const w=this.getWorship(today());const cur=w.sholatSunnah[key]||0;const idx=si.steps.indexOf(cur);w.sholatSunnah[key]=si.steps[(idx+1)%si.steps.length];this.setWorship(today(),w);this.render();break}case 'infaq':this.openInfaqInput();break;case 'tadarus':this.openTadarusInput();break;case 'dayDetail':this.openDayDetail(el.dataset.date);break;case 'addAccount':this.openAddAccount();break;case 'deleteTx':{const id=el.dataset.id;const tx=this.state.transactions.find(t=>t.id===id);if(tx){const acc=this.state.accounts.find(a=>a.id===tx.accountId);if(acc){if(tx.type==='income')acc.balance-=tx.amount;else acc.balance+=tx.amount}this.state.transactions=this.state.transactions.filter(t=>t.id!==id);this.saveState();showToast('Transaksi dihapus');this.render()}break}}}
}

const app=new NuurApp();
document.getElementById('mainContent').addEventListener('click',e=>{const target=e.target.closest('[data-action]');if(target)app.handleAction(target)});
document.addEventListener('keydown',e=>{if(e.key==='Escape')$('#modalBackdrop').classList.remove('show')});
</script>
</body>
</html>
