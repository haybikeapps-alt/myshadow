<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>MyShadow — Ibadah & Keuangan</title>
<meta name="description" content="Pelacak ibadah harian dan keuangan pribadi">
<meta name="theme-color" content="#34D399">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MyShadow">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script>tailwind.config={theme:{extend:{fontFamily:{sans:['Outfit','sans-serif']}}}}</script>
<link rel="stylesheet" href="style.css">
</head>
<body data-mode="ibadah">
<div id="modeOverlay"></div>
<div id="toast" class="toast"></div>
<div id="app">
<header class="app-header">
<div class="mode-toggle" id="modeToggle">
<div class="mode-pill" id="modePill"></div>
<div class="mode-btn active" data-mode="ibadah" onclick="app.switchMode('ibadah')"><i class="fa-solid fa-hands-praying"></i> Ibadah</div>
<div class="mode-btn" data-mode="financial" onclick="app.switchMode('financial')"><i class="fa-solid fa-wallet"></i> Keuangan</div>
</div>
<div id="dateDisplay" class="text-center mt-3 text-sm" style="color:var(--tx2)"></div>
</header>
<main id="mainContent" class="flex-1 px-5 pt-3 pb-4"></main>
<nav class="bottom-nav" id="bottomNav"></nav>
<button class="fab" id="fab" onclick="app.openAddTx()" aria-label="Tambah Transaksi"><i class="fa-solid fa-plus"></i></button>
</div>
<div class="mb" id="modalBackdrop" onclick="app.closeModal(event)">
<div class="ms" id="modalSheet" onclick="event.stopPropagation()">
<div class="mh"></div>
<div id="modalContent"></div>
</div>
</div>
<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}
</script>
<script src="app.js"></script>
<script src="app2.js"></script>
</body>
</html>
